<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kadirdein77 | Portfolio</title>
    <!-- Modern ve Keskin Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #ffffff;
            --secondary: #666;
            --border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.02);
            --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Arka Plan Derinlik (Glow) --- */
        .glow-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% -20%, #1a1a1a 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #080808 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        /* --- Navigasyon (Pill Design) --- */
        nav {
            position: fixed;
            top: 25px; left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: fit-content;
        }

        .nav-inner {
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 30px;
            border-radius: 100px;
            border: 1px solid var(--border);
            display: flex;
            gap: 25px;
        }

        .nav-inner a {
            color: var(--secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-inner a:hover { color: #fff; }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .profile-container {
            position: relative;
            margin-bottom: 35px;
            animation: float 6s ease-in-out infinite;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 1px solid var(--border);
            padding: 8px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: clamp(54px, 12vw, 90px);
            font-weight: 800;
            letter-spacing: -4px;
            line-height: 0.85;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .uidesigner-tag {
            font-size: 10px; /* İstediğin gibi çok küçük */
            text-transform: uppercase;
            letter-spacing: 0.6em; /* Harfler arası açık profesyonel duruş */
            color: var(--secondary);
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* --- Portfolyo Grid --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 0 40px; }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--secondary);
            margin-bottom: 60px;
            text-align: center;
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            padding-bottom: 120px;
        }

        /* --- HOVER EFEKTLERİ --- */
        .work-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            overflow: hidden;
            aspect-ratio: 16/10;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
        }

        .work-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            filter: brightness(0.8);
        }

        .work-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .work-card:hover img {
            transform: scale(1.08);
            filter: brightness(1);
        }

        /* --- Kart İçindeki Yazı Efekti --- */
        .card-info {
            position: absolute;
            bottom: -50px; left: 30px;
            transition: var(--transition);
            opacity: 0;
        }

        .work-card:hover .card-info {
            bottom: 30px;
            opacity: 1;
        }

        /* --- Animasyonlar --- */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .scroll-reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: var(--transition);
        }

        .scroll-reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            h1 { letter-spacing: -2px; }
            .nav-inner { width: 90%; justify-content: center; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="glow-overlay"></div>

    <nav>
        <div class="nav-inner">
            <a href="#home">Home</a>
            <a href="#work">Work</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <div class="container">
        <!-- HERO AREA -->
        <section class="hero" id="home">
            <div class="profile-container">
                <img src="profil-fotografin.jpg" alt="kadirdein77" class="profile-img">
            </div>
            
            <h1 class="scroll-reveal">kadirdein77</h1>
            <p class="uidesigner-tag scroll-reveal">uidesigner</p>

            <div class="scroll-reveal" style="margin-top: 20px;">
                <a href="#work" style="color: #fff; text-decoration: none; font-size: 13px; border-bottom: 1px solid #444; padding-bottom: 4px;">Scroll to explore ↓</a>
            </div>
        </section>

        <!-- PORTFOLIO SECTION -->
        <section id="work" style="padding-top: 100px;">
            <span class="section-title scroll-reveal">Selected Works</span>
            
            <div class="grid">
                <div class="work-card scroll-reveal">
                    <img src="1.png" alt="Project 1">
                    <div class="card-info"><span>Project One</span></div>
                </div>
                <div class="work-card scroll-reveal">
                    <img src="2.png" alt="Project 2">
                    <div class="card-info"><span>Project Two</span></div>
                </div>
                <div class="work-card scroll-reveal">
                    <img src="3.png" alt="Project 3">
                    <div class="card-info"><span>Project Three</span></div>
                </div>
                <div class="work-card scroll-reveal">
                    <img src="4.png" alt="Project 4">
                    <div class="card-info"><span>Project Four</span></div>
                </div>
            </div>
        </section>
    </div>

    <!-- FOOTER -->
    <footer style="padding: 100px 0 40px; text-align: center; border-top: 1px solid var(--border);">
        <p style="font-size: 11px; color: var(--secondary); letter-spacing: 2px; text-transform: uppercase;">
            © 2026 kadirdein77 — Built for the future
        </p>
    </footer>

    <script>
        // Sayfayı aşağı kaydırdıkça öğelerin belirmesi (Scroll Reveal)
        const observerOptions = {
            threshold: 0.15
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.scroll-reveal').forEach(el => {
            observer.observe(el);
        });

        // Mouse takibiyle arka planda çok hafif parlayan ışık efekti
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            document.querySelector('.glow-overlay').style.background = `
                radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(255,255,255,0.03) 0%, transparent 40%),
                radial-gradient(circle at 50% -20%, #1a1a1a 0%, transparent 50%)
            `;
        });
    </script>
</body>
</html>
