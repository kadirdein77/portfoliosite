<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kadirdein77 | UI Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 80%);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Arka Plan Derinlik Efekti --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.02;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
        }

        /* --- Navigasyon --- */
        nav {
            padding: 30px 0;
            display: flex;
            justify-content: center;
        }

        .nav-inner {
            background: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            padding: 8px 24px;
            border-radius: 100px;
            display: flex;
            gap: 20px;
        }

        .nav-inner a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }

        .nav-inner a:hover {
            color: var(--text-main);
        }

        /* --- Hero Section (Tam Ortalanmış) --- */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .profile-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid var(--border);
            padding: 5px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0) 100%);
            object-fit: cover;
        }

        .hero h1 {
            font-size: clamp(40px, 8vw, 64px);
            font-weight: 600;
            letter-spacing: -2px;
            margin-bottom: 4px;
        }

        .sub-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 400;
        }

        .hero-desc {
            max-width: 450px;
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 30px;
        }

        /* --- Butonlar --- */
        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--text-main);
            color: var(--bg);
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* --- Portfolio Grid --- */
        .work {
            padding-bottom: 100px;
        }

        .section-title {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .grid-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/10;
            cursor: pointer;
            transition: 0.4s;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%);
            transition: 0.4s;
        }

        .grid-item:hover {
            border-color: rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .grid-item:hover img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 48px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <div class="nav-inner">
                <a href="#home">Home</a>
                <a href="#work">Work</a>
                <a href="https://discord.com/users/411860478655070208" target="_blank">Contact</a>
            </div>
        </nav>

        <section class="hero" id="home">
            <div class="profile-wrapper">
                <!-- Profil fotoğrafın buraya gelecek -->
                <img src="profil-fotografin.jpg" alt="kadirdein77" class="profile-img">
            </div>
            
            <h1>kadirdein77</h1>
            <p class="sub-title">uidesigner</p>
            
            <p class="hero-desc">
                Roblox evreni için minimalist ve yüksek performanslı arayüzler tasarlıyorum. Modern estetiği kullanıcı deneyimiyle birleştiriyorum.
            </p>

            <div class="btn-group">
                <a href="#work" class="btn btn-primary">Portfolyo</a>
                <a href="https://discord.com/users/411860478655070208" class="btn btn-secondary">İletişim</a>
            </div>
        </section>

        <section class="work" id="work">
            <p class="section-title">Seçilmiş Çalışmalar</p>
            <div class="grid">
                <!-- Örnek Resimler (1.png, 2.png gibi değiştirirsin) -->
                <div class="grid-item"><img src="1.png" alt="Work 1"></div>
                <div class="grid-item"><img src="2.png" alt="Work 2"></div>
                <div class="grid-item"><img src="3.png" alt="Work 3"></div>
                <div class="grid-item"><img src="4.png" alt="Work 4"></div>
            </div>
        </section>
    </div>

</body>
</html>
